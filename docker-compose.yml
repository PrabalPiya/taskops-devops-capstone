services:
  mysql:
    image: mysql:8.0
    container_name: taskops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskops
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: taskops-backend
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: taskops
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: taskops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: