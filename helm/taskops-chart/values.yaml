frontend:
  replicaCount: 2
  image:
    repository: 443845329055.dkr.ecr.ap-south-1.amazonaws.com/taskops-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80

backend:
  replicaCount: 2
  image:
    repository: 443845329055.dkr.ecr.ap-south-1.amazonaws.com/taskops-backend
    tag: latest
    pullPolicy: Always
  service:
    port: 5000
  env:
    PORT: "5000"
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_NAME: taskops
    DB_USER: root
    DB_PASSWORD: password

mysql:
  image:
    repository: mysql
    tag: "8.0"
  database: taskops
  rootPassword: password
  storage: 1Gi