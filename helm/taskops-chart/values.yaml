backend:
  replicaCount: 2
  image:
    repository: xpocky/taskops-backend
    tag: latest
    pullPolicy: Always
  service:
    port: 5000
  env:
    PORT: "5000"
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_NAME: taskops
    DB_USER: root
    DB_PASSWORD: password

frontend:
  replicaCount: 3
  image:
    repository: xpocky/taskops-frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 80
    nodePort: 30080

mysql:
  image:
    repository: mysql
    tag: "8.0"
  database: taskops
  rootPassword: password
  storage: 1Gi